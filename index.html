<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>大鱼吃小鱼</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="hud">
        <div class="badge">
          <span class="label">分数</span>
          <strong id="score">0</strong>
        </div>
        <div class="badge">
          <span class="label">体型</span>
          <strong id="size">1.0x</strong>
        </div>
        <div class="badge">
          <span class="label">状态</span>
          <strong id="status">准备开吃</strong>
        </div>
        <div class="badge">
          <span class="label">难度</span>
          <strong id="difficultyMeter">休闲 · 1级</strong>
        </div>
      </section>

      <canvas id="gameCanvas" aria-label="大鱼吃小鱼游戏画布"></canvas>

      <section class="panel" id="panel">
        <div class="card">
          <p class="eyebrow">Python + Web Canvas</p>
          <h1 id="panelTitle">大鱼吃小鱼</h1>
          <p id="panelText">
            移动鼠标或手指控制你的鱼，先吃小鱼，慢慢长大，再去挑战更大的鱼。
          </p>
          <div class="difficulty-picker" id="difficultyPicker" role="group" aria-label="选择难度">
            <button type="button" class="difficulty-button active" data-difficulty="easy">休闲</button>
            <button type="button" class="difficulty-button" data-difficulty="normal">标准</button>
            <button type="button" class="difficulty-button" data-difficulty="hard">凶险</button>
          </div>
          <ul class="tips">
            <li>鼠标或手指控制方向</li>
            <li>按住鼠标左键冲刺，但会持续消耗自己的体型</li>
            <li>时间越久，鱼群越密、速度越快，大鱼也会更多</li>
          </ul>
          <div class="actions">
            <button id="startButton" type="button">开始游戏</button>
            <button id="restartButton" type="button" class="ghost">重新开始</button>
          </div>
        </div>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
